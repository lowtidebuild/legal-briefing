name: Game Legal Briefing

on:
  schedule:
    # Mon/Wed/Fri at 01:07 UTC (10:07 KST)
    - cron: "7 1 * * 1,3,5"
  workflow_dispatch:
    inputs:
      web_only:
        description: "Generate/deploy pages without sending email or saving Sheets"
        required: false
        default: false
        type: boolean
      render_date:
        description: "Re-render an existing YYYY-MM-DD data file without feeds, LLM, email, or Sheets"
        required: false
        default: ""
        type: string
      repair_date:
        description: "Generate missing entries, merge into an existing YYYY-MM-DD page, and skip delivery"
        required: false
        default: ""
        type: string
      force_delivery:
        description: "Resume a known partial delivery; completed stages are not repeated"
        required: false
        default: false
        type: boolean

concurrency:
  group: briefing
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --require-hashes -r requirements.lock

      - name: Run test gate
        run: python -m pytest -q

      - name: Set briefing date
        env:
          REPAIR_DATE: ${{ inputs.repair_date || '' }}
        run: |
          if [ -n "$REPAIR_DATE" ]; then
            if [[ ! "$REPAIR_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              echo "repair_date must use YYYY-MM-DD format" >&2
              exit 1
            fi
            echo "BRIEFING_DATE=$REPAIR_DATE" >> "$GITHUB_ENV"
          else
            echo "BRIEFING_DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)" >> "$GITHUB_ENV"
          fi

      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          RENDER_DATE: ${{ inputs.render_date || '' }}
          REPAIR_DATE: ${{ inputs.repair_date || '' }}
        run: |
          if [ -n "$RENDER_DATE" ] && [ -n "$REPAIR_DATE" ]; then
            echo "render_date and repair_date cannot be used together" >&2
            exit 1
          elif [ -n "$RENDER_DATE" ]; then
            python scripts/render_existing.py --date "$RENDER_DATE"
          elif [ -n "$REPAIR_DATE" ]; then
            mkdir -p /tmp/briefing-repair/data
            cp output/data/dedup_index.json /tmp/briefing-repair/data/dedup_index.json
            python main.py --delivery none --output /tmp/briefing-repair
            python scripts/merge_daily_for_web.py \
              --date "$REPAIR_DATE" \
              --source-output /tmp/briefing-repair
            python scripts/render_existing.py --date "$REPAIR_DATE"
          else
            python main.py --delivery none
          fi

      - name: Commit data files
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f output/data/
          git diff --cached --quiet || git commit -m "data: briefing $(date +%Y-%m-%d)"
          git push

      - name: Setup Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v4

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Record successful Pages deployment
        if: ${{ success() && github.ref == 'refs/heads/main' && (inputs.render_date == '' || inputs.render_date == null) && (inputs.repair_date == '' || inputs.repair_date == null) }}
        run: |
          python scripts/update_run_report.py \
            --date "$BRIEFING_DATE" \
            --stage git=completed \
            --stage pages=completed

      - name: Deliver generated run
        id: delivery
        if: ${{ success() && github.ref == 'refs/heads/main' && inputs.web_only != true && (inputs.render_date == '' || inputs.render_date == null) && (inputs.repair_date == '' || inputs.repair_date == null) }}
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          FORCE_DELIVERY: ${{ inputs.force_delivery || 'false' }}
        run: |
          args=(--date "$BRIEFING_DATE")
          if [ "$FORCE_DELIVERY" = "true" ]; then
            args+=(--force-delivery)
          fi
          python scripts/deliver_existing.py "${args[@]}"

      - name: Record failed Pages deployment
        if: ${{ failure() && github.ref == 'refs/heads/main' && steps.deployment.outcome == 'failure' && (inputs.render_date == '' || inputs.render_date == null) && (inputs.repair_date == '' || inputs.repair_date == null) }}
        run: |
          python scripts/update_run_report.py \
            --date "$BRIEFING_DATE" \
            --stage git=completed \
            --stage pages=failed \
            --status FAIL \
            --action "pages: failed"

      - name: Commit final run state
        if: ${{ always() && github.ref == 'refs/heads/main' && steps.deployment.outcome != 'skipped' && (inputs.render_date == '' || inputs.render_date == null) && (inputs.repair_date == '' || inputs.repair_date == null) }}
        run: |
          git add -f output/data/runs/
          if [ -d output/data/delivery_receipts ]; then
            git add -f output/data/delivery_receipts/
          fi
          git diff --cached --quiet || git commit -m "data: final run state $BRIEFING_DATE"
          git push
