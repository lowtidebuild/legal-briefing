pipeline:
  top_n: 10
  max_per_domain: 2
  fetch_body_for_selected: false
  body_fetch_timeout_seconds: 10
  body_fetch_max_chars: 8000
  categories:
    - IP
    - CONSUMER_MONETIZATION
    - CONTENT_AGE
    - PRIVACY_SECURITY
    - PLATFORM_PUBLISHING
    - AI_EMERGING
    - MA_CORP_ANTITRUST
    - ESPORTS_MARKETING
    - LABOR_EMPLOYMENT
    - ETC
  keywords:
    - lawsuit
    - sue
    - court
    - judge
    - litigation
    - patent
    - copyright
    - trademark
    - infringement
    - regulation
    - compliance
    - antitrust
    - monopoly
    - labor
    - union
    - privacy
    - security
    - data breach
    - policy
    - legislation
    - AI
    - artificial intelligence
    - esports
    - loot box
    - gambling
    - FTC
    - EU
    - DMA
    - DSA

